[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  # URL canónica: sitemap.xml, robots.txt e metadataBase (Open Graph). Defina no painel Netlify se preferir.
  # NEXT_PUBLIC_SITE_URL = "https://seu-site.netlify.app"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
