name: Update 2026 data

on:
  schedule:
    # Segunda, quinta e domingo 03:00 UTC (~ meia-noite BRT)
    - cron: "0 3 * * 1,4,0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data-2026
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx tsx scripts/update-current.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/2026.json
          if git diff --cached --quiet; then
            echo "No changes to data/2026.json"
            exit 0
          fi
          git commit -m "chore(data): atualiza Brasileirão 2026"
          git push
